<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Carolina Krakens — Season Stats</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header no-print">
    <div class="brand">
      <img src="assets/logo.png" alt="Carolina Krakens" class="brand-logo">
      <div class="brand-text">
        <h1 id="team-title">Carolina Krakens</h1>
        <div class="meta" id="season-meta"></div>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="season">Season Box Score</button>
      <button class="tab" data-view="games">Games</button>
      <button class="tab" data-view="player">Player</button>
    </nav>
  </header>

  <main id="content">
    <!-- view content rendered here -->
  </main>

  <footer class="app-footer no-print">
    <span id="generated-at"></span>
    <button id="print-btn">Print / Save as PDF</button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
